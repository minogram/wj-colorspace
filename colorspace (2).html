        // --- 색상 변환 함수 (Lab to RGB) ---
        function labToRgb(l, a, b) {
            let y = (l + 16) / 116;
            let x = a / 500 + y;
            let z = y - b / 200;

            const fn = (v) => v > 0.008856 ? Math.pow(v, 3) : (v - 16 / 116) / 7.787;
            x = 0.95047 * fn(x);
            y = 1.00000 * fn(y);
            z = 1.08883 * fn(z);

            let r = x * 3.2406 + y * -1.5372 + z * -0.4986;
            let g = x * -0.9689 + y * 1.8758 + z * 0.0415;
            let b_rgb = x * 0.0557 + y * -0.2040 + z * 1.0570;

            const f_rgb = (v) => v > 0.0031308 ? 1.055 * Math.pow(v, 1/2.4) - 0.055 : 12.92 * v;
            return [
                Math.max(0, Math.min(1, f_rgb(r))),
                Math.max(0, Math.min(1, f_rgb(g))),
                Math.max(0, Math.min(1, f_rgb(b_rgb)))
            ];
        }

        // --- Three.js 초기화 ---
        let scene, camera, renderer, controls, raycaster;
        let mouse = new THREE.Vector2();
        let screenX = 0, screenY = 0;
        const points = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1500);
            camera.position.set(200, 150, 200);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            raycaster = new THREE.Raycaster();

            // 가이드라인 및 그리드
            const gridHelper = new THREE.GridHelper(240, 24, 0x1e293b, 0x1e293b);
            scene.add(gridHelper);

            // 축 헬퍼
            const axesHelper = new THREE.AxesHelper(130);
            scene.add(axesHelper);

            // 광원
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.6);
            mainLight.position.set(150, 250, 150);
            scene.add(mainLight);

            // 포인트 생성
            colorData.forEach(item => {
                const [r, g, b] = labToRgb(item.l, item.a, item.b);
                const geometry = new THREE.SphereGeometry(2.5, 20, 20);
                const material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(r, g, b),
                    roughness: 0.2,
                    metalness: 0.1,
                    emissive: new THREE.Color(r, g, b),
                    emissiveIntensity: 0.12
                });
                
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(item.a, item.l, item.b);
                sphere.userData = { ...item };
                
                scene.add(sphere);
                points.push(sphere);
            });

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            screenX = event.clientX;
            screenY = event.clientY;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(points);
            const tooltip = document.getElementById('tooltip');

            if (intersects.length > 0) {
                const target = intersects[0].object;
                const data = target.userData;
                
                tooltip.style.display = 'block';
                tooltip.style.left = (screenX + 20) + 'px';
                tooltip.style.top = (screenY - 20) + 'px';
                
                const rgbLabel = `rgb(${Math.round(target.material.color.r*255)}, ${Math.round(target.material.color.g*255)}, ${Math.round(target.material.color.b*255)})`;
                
                tooltip.innerHTML = `
                    <div class="flex flex-col gap-1 mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-md border border-white/20 shadow-sm" style="background-color:${rgbLabel}"></div>
                            <span class="font-bold text-[15px] text-white">${data.name}</span>
                        </div>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <span class="px-1.5 py-0.5 rounded bg-white/10 text-white/60 text-[10px] font-mono tracking-wider">CODE</span>
                            <span class="font-semibold text-blue-400 font-mono text-xs">${data.code}</span>
                        </div>
                    </div>
                    <div class="space-y-1.5 opacity-80 text-[11px] font-mono border-t border-white/5 pt-2">
                        <div class="flex justify-between gap-8 text-slate-400"><span>L* (Lightness)</span> <span class="text-white">${data.l.toFixed(2)}</span></div>
                        <div class="flex justify-between gap-8 text-slate-400"><span>a* (Red/Green)</span> <span class="text-white">${data.a.toFixed(2)}</span></div>
                        <div class="flex justify-between gap-8 text-slate-400"><span>b* (Yell/Blue)</span> <span class="text-white">${data.b.toFixed(2)}</span></div>
                    </div>
                    <div class="mt-2 text-right text-[9px] text-slate-600">ID: #${data.id}</div>
                `;

                points.forEach(p => p.scale.lerp(new THREE.Vector3(1, 1, 1), 0.15));
                target.scale.lerp(new THREE.Vector3(1.8, 1.8, 1.8), 0.25);
            } else {
                tooltip.style.display = 'none';
                points.forEach(p => p.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1));
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
